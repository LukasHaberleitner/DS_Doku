   <tr>
     <td VALIGN="top" ALIGN="center">
     <img border="0" src="b35doc/english/online/icons_C2/common/atarget.gif" hspace="10" width="32" height="32"></td>
     <td>This task shows you how to rename a zone.</td>

       <div ALIGN="left">
         <table BORDER="0" CELLSPACING="1">

           </tr>
           <tr>
             <td>
             <img border="0" src="b35doc/english/online/eldug_c2/images/bt_zone15NLS.gif" hspace="10" width="476" height="417"></td>

       </li>
       <li>

       <li>
       <p CLASS="task">Enter the new name and click <kbd>OK</kbd>.<br>
