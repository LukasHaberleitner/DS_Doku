 <h1><a name="ix-surface machining functionalities">Using Surface Machining 
 Functionalities</a></h1>
 <p>Once a mold has been designed, it should be machined, with the exception of&nbsp; 
 standard components that were purchased from a supplier.</p>
 <p>Surface Machining should be used to machine the shape of the part to mold 
 (this concerns mainly the core and cavity).</p>
