 <h1>Deleting a Signal Route</h1>
 <table BORDER="0" CELLSPACING="1" VALIGN="top">
   <tr VALIGN="top" BORDER="0">
     <td ALIGN="center">
     <img src="b35doc/english/online/icons_C2/common/atarget.gif" width="32" height="32"></td>
     <td ROWSPAN="1" VALIGN="middle">
     <a NAME="ix-deleting:signal routes;commands::Delete Signal Route"></a>This 
     task shows you how to delete a signal route.</td>
   </tr>
   <tr VALIGN="top" BORDER="0">
     <td VALIGN="top" ALIGN="center">
     <img src="b35doc/english/online/icons_C2/common/ascenari.gif" width="32" height="32"></td>
     <td>
     <ol CLASS="task">
       <li>
       <p CLASS="task">Select the signal route to be deleted in the 
       specification tree: <kbd>SignalRoute2</kbd></li>
       <li>
       <p CLASS="task">Press the <kbd>Delete </kbd>key or right-click and select<kbd> 
       Delete</kbd> from the contextual menu.</p>
       <table BORDER="0" CELLSPACING="1">
         <tr>
           <td VALIGN="top">
           <img border="0" src="b35doc/english/online/ewrug_c2/images/bt_SpecTreeSSRdeleteNLS.gif" width="386" height="235"></td>
         </tr>
       </table>
       </li>
     </ol>
     <blockquote>
       <p>The signal route is deleted.</p>
     </blockquote>
     </td>
   </tr>
