 <h1 align="center"><a name="ix-posture functionality,::local posture reset">
 Local Posture Reset</a></h1>
 <div align="left">
   <table border="0" width="100%" cellspacing="3" cellpadding="3">
     <tr>
       <td width="44" valign="top">
       <img border="0" src="b35doc/english/online/icons_C2/common/ascenari.gif" width="32" height="32"></td>
       <td valign="top" width="100%">It is also possible to reset the posture of 
       an individual segment. Select the segment to reset, activate the 
       contextual menu with the right mouse button, and choose <kbd>Posture &gt; 
       Reset</kbd>.
       <p>Only the posture of the selected segment or segments will be reset.</p>
       <p><img border="0" src="b35doc/english/online/hbrug_c2/images/LocPosRstNLS.gif" width="372" height="496"></td>
