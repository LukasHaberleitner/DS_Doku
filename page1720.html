 <h1>Combining Behaviors <a name="ix-combining behaviors"></a></h1>
 <p align="center">
 <img border="0" src="b35doc/english/online/icons_C2/common/ap3_title.gif" width="152" height="32"></p>
 <p align="left">By using already defined building blocks, the expert user can 
 create a behavior. He can use combination behaviors (Logical and Sequential 
 Combinations) that can contain the components of the new behavior.</p>
 <p align="center"><img border="0" src="b35doc/english/online/bktug_c2/images/bktCombining.gif" width="148" height="182"> </p>
