 <h1>Zooming In On An Area</h1>
 <p align="center"><a name="CATFrame.ZoomArea"></a>&nbsp;<a name="ix-zooming::in on area"></a></p>
 <table Border="0" CELLSPACING="1" valign="top" height="189" width="100%">
   <tr valign="top" BORDER="0">
     <td height="41" valign="middle" width="2%">
     <img src="b35doc/english/online/icons_C2/common/atarget.gif" width="32" height="32"></td>
     <td rowspan="1" height="41" valign="middle">This task explains how to zoom 
     in on an area. </td>
   </tr>
   <tr valign="top" BORDER="0">
     <td height="69" width="2%">
     <img src="b35doc/english/online/icons_C2/common/ascenari.gif" width="32" height="32"></td>
     <td rowspan="1" height="69" valign="middle">
     <ol class="task">
       <li>
       <p class="task"><a name="ix-commands::Zoom Area;Zoom Area command"></a>
       Select <kbd>View &gt; Zoom Area</kbd>.</li>
       <li value="2">
       <p class="task">Drag (left mouse button) to draw the bounding outline 
       containing the area on which you want to zoom in. </li>
     </ol>
     </td>
   </tr>
   <tr valign="top" BORDER="0">
     <td height="37" valign="middle" width="2%"></td>
     <td rowspan="1" height="37" valign="middle">
     <blockquote>
       <p>The area now viewed is the area you captured inside the bounding 
       outline.</p>
     </blockquote>
     </td>
   </tr>
   <tr valign="top" BORDER="0">
     <td colspan="2" height="37" width="100%">
     <p align="center">
     <img src="b35doc/english/online/icons_C2/common/aendtask.gif" width="64" height="32"></td>
   </tr>
