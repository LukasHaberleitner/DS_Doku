 <table border="0" cellpadding="5" cellspacing="0">
   <tr>
     <td>&nbsp;</td>

     Edit&gt;Search</kbd> command.</td>
   </tr>
   <tr>
     <td valign="top">&nbsp;</td>
     <td>In the Search dialog box, you can select the <kbd>Functional 
     Tolerancing and Annotations</kbd> Workbench.<table border="0" cellpadding="0" cellspacing="0" bordercolor="#111111" id="AutoNumber1">

       </tr>
     </table>
     </td>
   </tr>
   <tr>
     <td></td>
