 <h1 ALIGN="center">Deleting a Zone
 <a NAME="CATEluCommandHdr.CATEluDeleteZoneHdr"></a></h1>
 <table BORDER="0" CELLSPACING="1" VALIGN="top" CELLPADDING="0">
   <tr>
     <td VALIGN="top" ALIGN="center">
     <img border="0" src="b35doc/english/online/icons_C2/common/atarget.gif" hspace="10" width="32" height="32"></td>
     <td>This task shows you how to <a NAME="ix-delete::zone">delete a zone</a>.</td>
   </tr>
   <tr>
     <td VALIGN="top" ALIGN="center">
     <img border="0" src="b35doc/english/online/icons_C2/common/ascenari.gif" width="32" height="32"></td>
     <td VALIGN="top">
     <ol CLASS="task">
       <li>
       <p CLASS="task"><a NAME="ix-zone::delete">To delete a zone</a>, click the
       <font FACE="Courier"><kbd>Delete Zone</kbd></font> button
       <img border="0" src="b35doc/english/online/icons_C2/images/I_Sac_DeleteZoneP2.gif" width="24" height="24">.
       </p>
       <div ALIGN="left">
         <table BORDER="0" CELLSPACING="1">
           <tr>
             <td>The Delete Zone dialog box will display.</td>
           </tr>
           <tr>
             <td>
             <img border="0" src="b35doc/english/online/eldug_c2/images/bt_zone16NLS.gif" hspace="10" width="462" height="412"></td>
           </tr>
         </table>
       </div>
       </li>
       <li>
       <p CLASS="task">&nbsp;Select the zone you want to delete and click <kbd>Delete</kbd>.<br>
       The zone and all its members will be deleted.</p>
       <div ALIGN="left">
         <table BORDER="0" CELLSPACING="1">
           <tr>
             <td>
             <img border="0" src="b35doc/english/online/eldug_c2/images/bt_zone17NLS.gif" hspace="10" width="360" height="270"></td>
           </tr>
         </table>
       </div>
       </li>
     </ol>
     </td>
   </tr>
 </table>
