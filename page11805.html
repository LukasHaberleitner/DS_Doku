 <h1><a name="ix-prismatic machining functionalities">Using Prismatic Machining 
 Functionalities</a></h1>
 <p>Once a mold has been designed, it should be machined, with the exception of 
 standard components that were purchased from a supplier.</p>
 <p>Prismatic Machining should be used to machine holes and pockets (this mainly 
 concerns plates).</p>
