 <h1 align="center"><a name="ix-printing a sheet">Printing a Sheet</a></h1>
 <table Border="0" CELLSPACING="0" valign="top" width="100%">
   <tr>
     <td width="46" height="1" valign="top">
     <img border="0" src="b35doc/english/online/icons_C2/common/atarget.gif" width="32" height="32"></td>
     <td width="929" valign="top" colspan="2">This task shows you how to print a 
     diagram sheet.</td>
   </tr>
   <tr>
     <td width="46" height="1" valign="top">
     <img border="0" src="b35doc/english/online/icons_C2/common/ascenari.gif" width="32" height="32"></td>
     <td width="35" valign="top"><font color="#1C1557"><b>1.</b></font></td>
     <td width="883" height="1" valign="top">From the main menu, click
     <font face="Courier New"><kbd>File - Print</kbd></font>. The Print dialog 
     box displays.
     <p><img border="0" src="b35doc/english/online/tudug_c2/images/AT0302A_NLS.gif" width="452" height="329"></td>
   </tr>
   <tr>
     <td width="46" height="1" valign="top"></td>
     <td width="44" valign="top"><font color="#1C1557"><b>2.</b></font></td>
     <td width="883" height="1" valign="top">Enter your preferences and click
     <kbd>OK</kbd>. <i>See Drafting documentation to learn more about the print 
     command.</i></td>
   </tr>
