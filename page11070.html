 <h1>Activating and Deactivating a Rule Set&nbsp;&nbsp;<a name="ix-rule set::activating and deactivating"></a>
 <a name="ix-activating and deactivating a rule set"></a></h1>
 <table border="0" cellpadding="4" cellspacing="0">
   <tr>
     <td valign="top" align="center">
     <img src="b35doc/english/online/icons_C2/common/atarget.gif" title="atarget.gif (1372 bytes)" width="32" height="32"></td>
     <td valign="top">This task explains how to activate and deactivate a Rule 
     Set.</td>
   </tr>
   <tr>
     <td valign="top">
     <h6>
     <img src="b35doc/english/online/icons_C2/common/ascenari.gif" title="ascenari.gif (1364 bytes)" width="32" height="32"></h6>
     </td>
     <td valign="top">
     <p style="mso-layout-grid-align:none;text-autospace:none">
     To activate and deactivate a Rule Set:</p>
     <table border="0">
       <tr>
         <td>
         <ul>
           <li>In the specification tree, right-click the rule set to be 
           activated or deactivated, then select <kbd>ruleset object &gt; (De)activate</kbd>.</li>
         </ul>
         </td>
       </tr>
     </table>
     </td>
   </tr>
