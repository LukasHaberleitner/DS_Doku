<!doctype html public "-//w3c//dtd html 4.0 transitional//en">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<meta name="GENERATOR" content="Microsoft FrontPage 4.0">
<meta name="ProgId" content="FrontPage.Editor.Document">
<title>Full-Text Search</title>
<script language="Javascript" src="b35doc/english/online/CATIA_PLM_Express_search.js"></script>
</head>
<body bgcolor="white">
<center>
<script language="Javascript">
var buf = "";
var init_failed = "Initialization failed";
if(window.location.search != "") buf = window.location.search;
if ( buf.charAt(0) == "?" )
{
	buf = buf.replace(/%20/g," ");
	document.write('<applet code="dssearchframe.class" archive="CATIA_PLM_Express_SearchAppletV1.jar" name="dssearchframe" width=681" height="21" mayscript>');
	document.write('<param name="FIND" value="Find next">');
	document.write('<param name="BGTEXTTURE" value="searchbg.jpg">');
	document.write('<param name="FONTNAME" value="Helvetica">');
	document.write('<param name="FONTSIZE" value="11">');
	document.write('<param name="FULLPAGE" value="yes">');
	document.write('<param name="ARGS" value="' + buf + '">');
	document.write('</applet>');
} else {
	alert (init_failed);
}
</script>
</center>
</body>
</html>
