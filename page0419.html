      <div class="title">
        <h3>Selection of Multiple Files for Deletion from Storage Manager Dialog Box</h3>
      </div>
    </div>

    <p>You can now select multiple files for deletion from the 
    <span class="guitext"><b class="guititle">Storage Manager</b></span> dialog box by using 
    <b class="keysym">[Ctrl]</b><b class="mousebutton">+Click</b> or <b class="keysym">[Shift]</b><b class="mousebutton">+Click</b>
    when you highlight rows in the bottom of the dialog box. 

</p><span id="ath-gen-app-wn-612support"></span>
