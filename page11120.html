 <h1>MechanicalFeature </h1>
 <p align="center">
 <img border="0" src="b35doc/english/online/icons_C2/common/ap2_title.gif" width="152" height="32"></p>
 <h4><font color="#282187"><font color="#282187">Description</font></font></h4>
 <p>Describes the parent of all the mechanical features.</p>
 <p>Inheritance path: Standard - <a href="page11107.html">Feature</a> &gt; Standard - <a href="page11133.html">Visualizable</a></p>
 <h4><font color="#282187"><font color="#282187">Attribute</font></font></h4>
 <p><font face="Courier10 BT"><kbd>Activity</kbd></font><br>
 Sets or gets the activity of a mechanical feature. </p>
 <h4><font color="#282187"><font color="#282187">Example</font></font></h4>
 <p><font face="Courier10 BT"><code>(for all) H:Hole<br>
 H.Activity == true</code></font></p>
